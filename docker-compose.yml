name: ticketwave

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketwave-postgres
    environment:
      POSTGRES_DB: ticketwave
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  activemq:
    image: apache/activemq-artemis:latest
    container_name: ticketwave-activemq
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
    ports:
      - "61616:61616"
      - "8161:8161"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8161 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketwave-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/ticketwave
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      ACTIVEMQ_USER: admin
      ACTIVEMQ_PASSWORD: admin
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      activemq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketwave-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:

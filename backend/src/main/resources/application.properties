spring.application.name=ticketwave

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ticketwave}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Ensure Hibernate creates/updates the schema before data.sql runs
spring.jpa.defer-datasource-initialization=true

# SQL Initialization – run data.sql on every startup (inserts are idempotent)
spring.sql.init.mode=always

# ActiveMQ Configuration
spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.user=${ACTIVEMQ_USER:admin}
spring.activemq.password=${ACTIVEMQ_PASSWORD:admin}

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration
jwt.secret=ticketwave-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000
